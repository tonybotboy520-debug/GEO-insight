<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GEO信息洞察</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23172a24'/%3E%3Cpath d='M15 18h34v5H15zm0 12h25v5H15zm0 12h30v5H15z' fill='%23f7f8f5'/%3E%3Ccircle cx='49' cy='42' r='6' fill='%23d3922e'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #050607;
      --surface: #101216;
      --surface-2: #171a20;
      --surface-3: #0b0d10;
      --ink: #f3efe6;
      --muted: #9b988f;
      --muted-strong: #cbc5b8;
      --soft: #1a1d23;
      --line: #292d34;
      --line-strong: #444952;
      --green: #d7b66e;
      --blue: #8fb8d8;
      --amber: #65cbbb;
      --red: #d17770;
      --shadow: 0 28px 74px rgba(0, 0, 0, .48);
      --page-bg:
        linear-gradient(135deg, rgba(215,182,110,.09), transparent 36%),
        linear-gradient(180deg, #050607 0%, #090b0f 42%, #050607 100%),
        var(--bg);
      --lede: #bbb5a9;
      --glass: rgba(16, 18, 22, .82);
      --panel-bg: rgba(14, 16, 20, .94);
      --panel-soft: #0b0d10;
      --panel-wash: #080a0d;
      --field-bg: #12151a;
      --toolbar-bg: rgba(10, 12, 15, .92);
      --button-hover: #191d24;
      --plain-text: #d8d3c8;
      --rule-text: #e2c884;
      --chip-text: #d3cec2;
      --nav-text: #c3bfb5;
      --badge-bg: #e6dcc8;
      --badge-ink: #14100a;
      --green-wash: rgba(215, 182, 110, .12);
      --blue-wash: rgba(143, 184, 216, .13);
      --amber-wash: rgba(101,203,187,.14);
      --mark-bg: rgba(215, 182, 110, .34);
      --theme-active-bg: #e6dcc8;
      --theme-active-ink: #14100a;
      --focus-ring: rgba(215, 182, 110, .5);
      --radius: 8px;
    }

    body[data-theme="light"] {
      --bg: #f5f7f4;
      --surface: #ffffff;
      --surface-2: #fbfcfb;
      --surface-3: #fcfdfc;
      --ink: #14211d;
      --muted: #6c7772;
      --muted-strong: #53605a;
      --soft: #eef2ee;
      --line: #dde5df;
      --line-strong: #bdcbc4;
      --green: #13766c;
      --blue: #365f84;
      --amber: #c68419;
      --red: #a8564e;
      --shadow: 0 18px 42px rgba(22, 37, 32, .08);
      --page-bg:
        linear-gradient(180deg, rgba(255,255,255,.82), rgba(245,247,244,.9) 260px),
        radial-gradient(circle at 0 0, rgba(19,118,108,.08), transparent 330px),
        var(--bg);
      --lede: #53605a;
      --glass: rgba(255,255,255,.86);
      --panel-bg: rgba(255,255,255,.88);
      --panel-soft: #f9fbf8;
      --panel-wash: #f8faf8;
      --field-bg: #fbfcfb;
      --toolbar-bg: rgba(255,255,255,.94);
      --button-hover: #f7fbf9;
      --plain-text: #2a3732;
      --rule-text: #104d47;
      --chip-text: #43514b;
      --nav-text: #41504a;
      --badge-bg: #172a24;
      --badge-ink: #ffffff;
      --green-wash: rgba(19, 118, 108, .08);
      --blue-wash: rgba(54, 95, 132, .1);
      --amber-wash: rgba(198,132,25,.12);
      --mark-bg: rgba(198, 132, 25, .24);
      --theme-active-bg: #172a24;
      --theme-active-ink: #ffffff;
      --focus-ring: rgba(19, 118, 108, .35);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      position: relative;
      margin: 0;
      color: var(--ink);
      background: var(--page-bg);
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
      line-height: 1.62;
      letter-spacing: 0;
      color-scheme: dark;
    }

    body[data-theme="light"] { color-scheme: light; }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.026) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.8), transparent 70%);
      opacity: .35;
    }

    body[data-theme="light"]::before { display: none; }

    a { color: inherit; }
    button, input, select { font: inherit; letter-spacing: 0; }
    button, a, input {
      transition: background-color .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease;
    }

    button:focus-visible,
    a:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--focus-ring);
      outline-offset: 3px;
    }

    ::placeholder {
      color: var(--muted);
      opacity: .78;
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 1380px;
      margin: 0 auto;
      padding: 30px 28px 42px;
    }

    .theme-switch {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(74px, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--glass);
      box-shadow: 0 12px 32px rgba(0, 0, 0, .12);
      backdrop-filter: blur(16px);
    }

    .theme-option {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 0 12px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 750;
      white-space: nowrap;
    }

    .theme-option svg {
      width: 15px;
      height: 15px;
    }

    .theme-option.active {
      background: var(--theme-active-bg);
      color: var(--theme-active-ink);
      box-shadow: 0 6px 18px rgba(0, 0, 0, .16);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: start;
      padding: 28px 0 28px;
    }

    .hero-actions {
      justify-self: end;
      align-self: start;
      padding-top: 31px;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-family: "Songti SC", "STSong", "Noto Serif CJK SC", "Source Han Serif SC", serif;
      font-size: 48px;
      line-height: 1.08;
      font-weight: 600;
    }

    body[data-theme="dark"] h1 {
      color: #fffaf1;
      text-shadow: 0 16px 42px rgba(215, 182, 110, .12);
    }

    .lede {
      max-width: 820px;
      margin: 16px 0 0;
      color: var(--lede);
      font-size: 17px;
      line-height: 1.78;
    }

    .workspace {
      overflow: visible;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-bg);
      box-shadow: var(--shadow);
    }

    .tabs {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .tab {
      min-width: 126px;
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
    }

    .tab:hover { background: var(--soft); }
    .tab.active {
      border-color: var(--line-strong);
      background: var(--surface);
      color: var(--ink);
      box-shadow: inset 0 -2px 0 var(--green), 0 10px 24px rgba(0, 0, 0, .12);
    }
    .tab span { color: var(--green); }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 4;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(220px, 300px) minmax(150px, 190px) auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--toolbar-bg);
      backdrop-filter: blur(14px);
    }

    .searchbox {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 0 13px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--field-bg);
    }

    .searchbox:focus-within {
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-wash);
    }

    .searchbox svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      color: var(--green);
    }

    input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font-size: 15px;
    }

    .category-filter {
      position: relative;
      min-width: 0;
    }

    .category-trigger {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      width: 100%;
      min-height: 46px;
      padding: 0 12px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--field-bg);
      color: var(--ink);
      cursor: pointer;
      text-align: left;
    }

    .category-trigger:hover,
    .category-filter.open .category-trigger {
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-wash);
    }

    .category-trigger-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .category-trigger b {
      overflow: hidden;
      color: var(--ink);
      font-size: 14px;
      font-weight: 750;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .category-trigger svg {
      width: 16px;
      height: 16px;
      color: var(--green);
      transition: transform .18s ease;
    }

    .category-filter.open .category-trigger svg {
      transform: rotate(180deg);
    }

    .category-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      z-index: 20;
      width: min(420px, calc(100vw - 40px));
      max-height: 420px;
      overflow: hidden;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 24px 58px rgba(0, 0, 0, .38);
    }

    body[data-theme="light"] .category-menu {
      box-shadow: 0 18px 42px rgba(22, 37, 32, .14);
    }

    .category-menu-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .category-menu-head small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .category-options {
      display: grid;
      gap: 4px;
      max-height: 360px;
      overflow: auto;
      padding: 8px;
    }

    .category-option {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
      width: 100%;
      min-height: 36px;
      padding: 7px 8px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--chip-text);
      cursor: pointer;
      text-align: left;
      font-size: 13px;
      font-weight: 720;
    }

    .category-option:hover,
    .category-option.active {
      border-color: var(--line);
      background: var(--soft);
      color: var(--ink);
    }

    .category-check {
      display: grid;
      place-items: center;
      width: 16px;
      height: 16px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      color: transparent;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .category-option.active .category-check {
      border-color: var(--green);
      background: var(--green);
      color: var(--badge-ink);
    }

    .category-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .category-count {
      min-width: 30px;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--green-wash);
      color: var(--green);
      text-align: center;
      font-size: 12px;
      font-weight: 800;
    }

    .select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 46px;
      padding: 0 11px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--field-bg);
    }

    .select-wrap:focus-within {
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-wash);
    }

    .select-wrap span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    select {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font-weight: 650;
      cursor: pointer;
    }

    .read-status-filter {
      min-width: 0;
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
    }

    .icon-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--button-hover);
    }

    .icon-btn svg { width: 18px; height: 18px; }

    .content-layout {
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      align-items: stretch;
      background: var(--panel-wash);
    }

    .content-nav {
      min-width: 0;
      border-right: 1px solid var(--line);
      background: var(--surface-3);
    }

    .nav-inner {
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 90px);
      overflow: auto;
      padding: 16px 12px 16px 16px;
    }

    .nav-title {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .nav-list {
      display: grid;
      gap: 6px;
    }

    .nav-link {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      width: 100%;
      padding: 9px 10px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--nav-text);
      cursor: pointer;
      font: inherit;
      text-align: left;
      text-decoration: none;
    }

    .nav-link:hover,
    .nav-link.active {
      border-color: var(--line);
      background: var(--surface);
      color: var(--ink);
    }

    .nav-index {
      display: grid;
      place-items: center;
      width: 27px;
      height: 24px;
      border-radius: 6px;
      background: var(--soft);
      color: var(--green);
      font-size: 11px;
      font-weight: 750;
    }

    .nav-link.active .nav-index {
      background: var(--green);
      color: var(--badge-ink);
    }

    .nav-copy {
      min-width: 0;
    }

    .nav-title-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: start;
    }

    .nav-copy b {
      display: -webkit-box;
      overflow: hidden;
      color: inherit;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.38;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .read-mini {
      margin-top: 1px;
      padding: 2px 5px;
      border-radius: 999px;
      background: var(--green-wash);
      color: var(--green);
      font-size: 10px;
      font-style: normal;
      font-weight: 800;
      line-height: 1.2;
      white-space: nowrap;
    }

    .nav-copy small {
      display: block;
      overflow: hidden;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-copy .nav-date {
      color: var(--green);
      font-size: 11px;
      font-weight: 750;
    }

    .list {
      display: grid;
      gap: 14px;
      align-self: start;
      min-width: 0;
      padding: 16px;
    }

    .insight-card {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      scroll-margin-top: 92px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.035);
    }

    .card-top {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-width: 0;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .card-top > span:not(.id-badge) {
      max-width: 100%;
      padding: 4px 7px;
      border-radius: 6px;
      background: var(--soft);
      color: var(--chip-text);
      line-height: 1.25;
    }

    .id-badge {
      width: max-content;
      max-width: 100%;
      padding: 6px 9px;
      border-radius: 6px;
      background: var(--badge-bg);
      color: var(--badge-ink);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .source-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .source-line span {
      padding: 4px 7px;
      border-radius: 6px;
      background: var(--soft);
      color: var(--chip-text);
      line-height: 1.25;
    }

    .source-line .region {
      background: var(--blue-wash);
      color: var(--blue);
    }

    .source-line .score {
      background: var(--amber-wash);
      color: var(--amber);
    }

    .date-pill {
      background: var(--green-wash);
      color: var(--green);
    }

    .date-pill.missing {
      background: var(--soft);
      color: var(--muted);
    }

    .read-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      margin-left: auto;
      padding: 5px 9px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .read-toggle:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--button-hover);
    }

    .read-toggle.active {
      border-color: var(--green);
      background: var(--green-wash);
      color: var(--green);
    }

    .read-toggle svg {
      width: 14px;
      height: 14px;
    }

    .card-main { min-width: 0; }

    .card-main h2 {
      margin: 0;
      font-family: "Songti SC", "STSong", "Noto Serif CJK SC", "Source Han Serif SC", serif;
      font-size: 25px;
      line-height: 1.36;
      font-weight: 650;
    }

    .card-main h2 a {
      text-decoration-thickness: 1px;
      text-underline-offset: 4px;
      text-decoration-color: var(--line-strong);
    }

    .card-main h2 a:hover { text-decoration-color: var(--green); }

    .origin {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.08fr);
      gap: 18px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .note-block {
      min-width: 0;
      padding-left: 13px;
      border-left: 3px solid var(--line-strong);
    }

    .note-block.rule { border-left-color: var(--green); }

    .label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .note-block p {
      margin: 0;
      color: var(--plain-text);
      font-size: 15px;
      line-height: 1.78;
    }

    .rule p { color: var(--rule-text); }

    .insight-list {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .insight-list h3 {
      margin: 0 0 10px;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.4;
      font-weight: 800;
    }

    .insight-list ol {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
      counter-reset: insight;
    }

    .insight-list li {
      position: relative;
      padding-left: 30px;
      color: var(--plain-text);
      line-height: 1.68;
    }

    .insight-list li::before {
      position: absolute;
      left: 0;
      top: 3px;
      counter-increment: insight;
      content: counter(insight);
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--green-wash);
      color: var(--green);
      font-size: 11px;
      font-weight: 800;
    }

    .insight-list b {
      display: block;
      color: var(--ink);
      font-weight: 750;
    }

    .insight-list span { display: block; }
    .insight-list small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .card-footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
    }

    .tag {
      max-width: 100%;
      padding: 4px 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--chip-text);
      background: var(--field-bg);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .text-link {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      color: var(--ink);
      background: var(--surface);
      font-size: 13px;
      font-weight: 750;
      text-decoration: none;
    }

    .text-link:hover {
      border-color: var(--green);
      color: var(--green);
    }

    mark {
      padding: 0 2px;
      border-radius: 3px;
      background: var(--mark-bg);
      color: inherit;
    }

    .empty {
      display: none;
      grid-column: 2;
      margin: 16px;
      padding: 48px 20px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      color: var(--muted);
      background: var(--surface);
      text-align: center;
      font-size: 16px;
    }

    .empty.show { display: block; }

    [hidden] { display: none !important; }

    @media (max-width: 1040px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 22px;
      }
      .hero-actions {
        justify-self: start;
        padding-top: 0;
      }
      .toolbar { grid-template-columns: minmax(0, 1fr) minmax(210px, 280px) minmax(150px, 190px) auto; }
      .content-layout {
        grid-template-columns: 238px minmax(0, 1fr);
      }
      .nav-inner {
        padding: 14px 10px;
      }
    }

    @media (max-width: 720px) {
      .shell { padding: 18px 14px 30px; }
      h1 { font-size: 34px; }
      .lede { font-size: 15px; }
      .tabs { flex-wrap: wrap; }
      .tab {
        min-width: 104px;
        min-height: 38px;
        padding: 0 14px;
      }
      .toolbar { grid-template-columns: 1fr; }
      .category-menu {
        left: 0;
        right: auto;
        width: min(100%, calc(100vw - 28px));
      }
      .content-layout { grid-template-columns: 1fr; }
      .content-nav {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .nav-inner {
        position: static;
        max-height: 240px;
        padding: 12px;
      }
      .summary-grid { grid-template-columns: 1fr; }
      .list { padding: 10px; }
      .insight-card { padding: 16px; }
      .card-main h2 { font-size: 22px; }
      .card-footer { align-items: flex-start; }
      .empty { grid-column: 1; }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">GEO Research Library</p>
        <h1>GEO 信息洞察</h1>
        <p class="lede">整合深度文章与学术论文，把每个来源压缩成“摘要重点”和“GEO 观点/规则”，便于快速检索可复用的链路判断、内容规则和监测口径。</p>
      </div>
      <div class="hero-actions">
        <div class="theme-switch" aria-label="主题切换">
          <button class="theme-option" type="button" data-theme-option="light" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
            <span>白色</span>
          </button>
          <button class="theme-option active" type="button" data-theme-option="dark" aria-pressed="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5 7 7 0 1 0 20.5 14.5Z"/></svg>
            <span>黑色</span>
          </button>
        </div>
      </div>
    </header>

    <main class="workspace">
      <nav class="tabs" aria-label="来源切换">
        <button class="tab active" type="button" data-tab="articles">文章 <span id="articleTabCount">0</span></button>
        <button class="tab" type="button" data-tab="papers">论文 <span id="paperTabCount">0</span></button>
      </nav>

      <section class="toolbar" aria-label="检索和筛选">
        <label class="searchbox">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input id="q" type="search" placeholder="搜索标题、摘要重点、GEO规则、标签..." autocomplete="off">
        </label>
        <div class="category-filter" id="categoryFilter">
          <button class="category-trigger" id="categoryTrigger" type="button" aria-expanded="false" aria-haspopup="true">
            <span class="category-trigger-label">分类</span>
            <b id="categorySummary">全部</b>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div class="category-menu" id="categoryMenu" hidden>
            <div class="category-menu-head">
              <span>分类筛选</span>
              <small id="categoryTotal">0 类</small>
            </div>
            <div id="categoryOptions" class="category-options"></div>
          </div>
        </div>
        <label class="select-wrap read-status-filter">
          <span>状态</span>
          <select id="readFilter" aria-label="阅读状态筛选">
            <option value="all">全部</option>
            <option value="read">仅已读</option>
            <option value="unread">仅未读</option>
          </select>
        </label>
        <div class="actions">
          <button class="icon-btn" id="reset" type="button" aria-label="重置筛选" title="重置筛选">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/></svg>
          </button>
          <button class="icon-btn" id="backTop" type="button" aria-label="回到顶部" title="回到顶部">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m18 15-6-6-6 6"/></svg>
          </button>
        </div>
      </section>

      <section class="content-layout" aria-label="洞察内容">
        <aside class="content-nav" aria-label="当前结果导航">
          <div class="nav-inner">
            <p class="nav-title">当前结果</p>
            <div id="contentNav" class="nav-list"></div>
          </div>
        </aside>
        <section id="list" class="list" aria-live="polite"></section>
        <div id="empty" class="empty">没有匹配结果，换一个关键词或分类试试。</div>
      </section>
    </main>
  </div>

  <script src="assets/data/geo-insights.js"></script>
  <script>
    const DATA = window.GEO_INSIGHT_DATA || { articles: [], papers: [], meta: {} };
    const ARTICLE_TITLE_CN = {
      101: 'OpenAI 爬虫概览',
      102: 'Claude 爬虫与屏蔽方式',
      103: 'Google AI 功能与网站内容呈现',
      104: '面向生成式 AI 功能的优化指南',
      105: 'Google 搜索工作原理',
      106: 'Google 抓取与索引概览',
      107: 'Robots.txt 入门说明',
      108: 'Robots Meta 与 X-Robots-Tag 控制',
      109: '站点地图概览',
      110: '如何构建并提交站点地图',
      111: '结构化数据入门',
      112: '结构化数据通用指南',
      113: '文章结构化数据',
      114: '组织结构化数据',
      115: '问答结构化数据',
      116: '产品结构化数据',
      119: 'Bing 站长工具 AI Performance 介绍',
      120: 'IndexNow 协议',
      121: 'Robots 排除协议 RFC 9309',
      122: 'llms.txt 文件说明',
      123: 'Answer.AI 的 llms.txt 提案',
      124: 'llms.txt 的多域名使用方式',
      125: 'Cloudflare AI Crawl Control 概览',
      126: 'Cloudflare AI 爬虫机器人参考',
      127: 'Cloudflare AI 爬虫管理方法',
      128: 'AI 爬虫与点击之间的落差',
      129: 'AI 搜索抓取与引用比例监测',
      130: '按抓取付费模式',
      131: 'AI Overview 引用与前 10 搜索结果关系',
      132: 'AI 助手更偏好新鲜内容研究',
      133: 'AI 中最常被引用的域名',
      134: 'AI 搜索引用 LinkedIn URL 研究',
      135: '如何优化 AI 搜索结果',
      136: 'AI Overviews 一周年观察',
      137: 'LLMs.txt 的 GEO 实验',
      138: '答案引擎优化指南',
      139: '答案引擎优化实施指南'
    };
    const READ_COOKIE = 'geoInsightReadItems';
    const state = { tab: 'articles', query: '', categories: new Set(), readFilter: 'all', selectedId: null, readItems: loadReadItems() };
    const q = document.querySelector('#q');
    const categoryFilter = document.querySelector('#categoryFilter');
    const categoryTrigger = document.querySelector('#categoryTrigger');
    const categoryMenu = document.querySelector('#categoryMenu');
    const categoryOptions = document.querySelector('#categoryOptions');
    const categorySummary = document.querySelector('#categorySummary');
    const categoryTotal = document.querySelector('#categoryTotal');
    const readFilter = document.querySelector('#readFilter');
    const navEl = document.querySelector('#contentNav');
    const listEl = document.querySelector('#list');
    const empty = document.querySelector('#empty');
    const themeButtons = document.querySelectorAll('[data-theme-option]');

    function setTheme(theme) {
      const nextTheme = theme === 'light' ? 'light' : 'dark';
      document.body.dataset.theme = nextTheme;
      themeButtons.forEach(button => {
        const active = button.dataset.themeOption === nextTheme;
        button.classList.toggle('active', active);
        button.setAttribute('aria-pressed', String(active));
      });
      localStorage.setItem('geoInsightTheme', nextTheme);
    }

    setTheme(localStorage.getItem('geoInsightTheme') || 'dark');

    document.querySelector('#articleTabCount').textContent = DATA.articles.length;
    document.querySelector('#paperTabCount').textContent = DATA.papers.length;

    function norm(value) {
      return String(value || '').toLowerCase();
    }

    function esc(value) {
      return String(value || '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }

    function loadReadItems() {
      const entry = document.cookie.split('; ').find(row => row.startsWith(`${READ_COOKIE}=`));
      if (!entry) return new Set();
      try {
        const value = decodeURIComponent(entry.slice(READ_COOKIE.length + 1));
        const items = JSON.parse(value);
        return new Set(Array.isArray(items) ? items.map(String) : []);
      } catch (_) {
        return new Set();
      }
    }

    function saveReadItems() {
      const value = encodeURIComponent(JSON.stringify([...state.readItems]));
      document.cookie = `${READ_COOKIE}=${value}; max-age=31536000; path=/; SameSite=Lax`;
    }

    function highlight(value) {
      const raw = String(value || '');
      const term = state.query.trim();
      if (!term) return esc(raw);
      const safe = esc(raw);
      const parts = term.split(/\s+/).filter(Boolean).map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
      if (!parts.length) return safe;
      return safe.replace(new RegExp('(' + parts.join('|') + ')', 'gi'), '<mark>$1</mark>');
    }

    function activeItems() {
      return state.tab === 'articles' ? DATA.articles : DATA.papers;
    }

    function itemCollection(item) {
      return DATA.papers.some(paper => String(paper.id) === String(item.id)) ? 'papers' : 'articles';
    }

    function readKey(item) {
      return `${itemCollection(item)}:${item.id}`;
    }

    function isRead(item) {
      return state.readItems.has(readKey(item));
    }

    function toggleRead(item) {
      const key = readKey(item);
      if (state.readItems.has(key)) {
        state.readItems.delete(key);
      } else {
        state.readItems.add(key);
      }
      saveReadItems();
    }

    function articleTitleCn(item) {
      return item.title_cn || ARTICLE_TITLE_CN[item.id] || item.title;
    }

    function hasTranslatedArticleTitle(item) {
      return articleTitleCn(item) !== item.title;
    }

    function formatDate(value) {
      const text = String(value || '').trim();
      if (!text) return '';
      const match = text.match(/^(\d{4})(?:-(\d{2}))?(?:-(\d{2}))?/);
      if (!match) return text;
      return [match[1], match[2], match[3]].filter(Boolean).join('.');
    }

    function primaryDateInfo(item) {
      if (item.published_at) {
        return { label: '发布时间', compactLabel: '发布', text: formatDate(item.published_at), missing: false };
      }
      if (item.updated_at) {
        return { label: '更新时间', compactLabel: '更新', text: formatDate(item.updated_at), missing: false };
      }
      return { label: '时间', compactLabel: '时间', text: '未公开', missing: true };
    }

    function dateInfos(item) {
      const infos = [primaryDateInfo(item)];
      if (item.published_at && item.updated_at && item.published_at !== item.updated_at) {
        infos.push({ label: '更新时间', compactLabel: '更新', text: formatDate(item.updated_at), missing: false });
      }
      return infos;
    }

    function compactDateText(item) {
      const info = primaryDateInfo(item);
      return info.missing ? '时间未公开' : `${info.compactLabel} ${info.text}`;
    }

    function dateBadgeHtml(item) {
      return dateInfos(item).map(info => `<span class="date-pill ${info.missing ? 'missing' : ''}">${esc(info.label)} ${esc(info.text)}</span>`).join('');
    }

    function sortableDateValue(item) {
      const value = item.published_at || item.updated_at || '';
      const match = String(value).match(/^(\d{4})(?:-(\d{2}))?(?:-(\d{2}))?/);
      if (!match) return 0;
      const year = Number(match[1]);
      const month = Number(match[2] || '1');
      const day = Number(match[3] || '1');
      return Date.UTC(year, month - 1, day);
    }

    function sortByNewest(items) {
      return [...items].sort((a, b) => {
        const byDate = sortableDateValue(b) - sortableDateValue(a);
        if (byDate !== 0) return byDate;
        return Number(b.id) - Number(a.id);
      });
    }

    function itemCategory(item) {
      return item.category || '未分类';
    }

    function countBy(items, getter) {
      const counts = new Map([['全部', items.length]]);
      items.forEach(item => {
        const key = getter(item) || '未分类';
        counts.set(key, (counts.get(key) || 0) + 1);
      });
      return [...counts.entries()];
    }

    function renderCategoryOptions() {
      const entries = countBy(activeItems(), itemCategory);
      categoryTotal.textContent = `${Math.max(entries.length - 1, 0)} 类`;
      categorySummary.textContent = state.categories.size === 0
        ? '全部'
        : state.categories.size === 1
          ? [...state.categories][0]
          : `已选 ${state.categories.size} 类`;
      categoryOptions.innerHTML = entries.map(([name, count]) => {
        const active = name === '全部' ? state.categories.size === 0 : state.categories.has(name);
        return `<button class="category-option ${active ? 'active' : ''}" type="button" data-category="${esc(name)}" aria-pressed="${String(active)}">
          <span class="category-check">${active ? '✓' : ''}</span>
          <span class="category-name">${esc(name)}</span>
          <span class="category-count">${count}</span>
        </button>`;
      }).join('');
    }

    function searchableArticle(item) {
      return norm([
        item.id, item.region, item.category, item.title, articleTitleCn(item), item.source_type, item.key_description,
        item.geo_value, item.url, item.search_query, item.published_at, item.updated_at, compactDateText(item), ...(item.tags || [])
      ].join(' '));
    }

    function searchablePaper(item) {
      return norm([
        item.id, item.category, item.title_cn, item.title, item.theme_title, item.summary,
        item.geo_principle, item.topic, item.url, item.published_at, item.updated_at, compactDateText(item), ...(item.tags || []),
        ...(item.insights || []).flatMap(x => [x.title, x.point, x.geo_value, x.geo_principle, x.evidence, ...(x.pages || [])])
      ].join(' '));
    }

    function matches(item) {
      const categoryOk = state.categories.size === 0 || state.categories.has(itemCategory(item));
      const readOk = state.readFilter === 'all' || (state.readFilter === 'read' ? isRead(item) : !isRead(item));
      const terms = norm(state.query).split(/\s+/).filter(Boolean);
      const text = state.tab === 'articles' ? searchableArticle(item) : searchablePaper(item);
      return categoryOk && readOk && terms.every(term => text.includes(term));
    }

    function articleLocalLinks(item) {
      const links = [];
      if (item.bilingual_file) {
        links.push(`<a class="text-link" href="${esc(bilingualReaderHref(item))}" title="打开统一阅读页，按 MD 文件加载中英对照内容">中英对照阅读</a>`);
      }
      links.push(`<a class="text-link" href="${esc(item.url)}">原文链接</a>`);
      return links.join('');
    }

    function bilingualReaderHref(item) {
      const params = new URLSearchParams();
      params.set('id', String(item.id));
      if (item.bilingual_file) params.set('file', item.bilingual_file);
      return `reader.html?${params.toString()}`;
    }

    function itemDomId(item) {
      return `${state.tab === 'articles' ? 'article' : 'paper'}-${item.id}`;
    }

    function itemTitle(item) {
      return state.tab === 'articles' ? articleTitleCn(item) : item.title_cn;
    }

    function itemSubTitle(item) {
      if (state.tab === 'articles') return [item.region, item.category].filter(Boolean).join(' · ');
      return [item.category, `${item.page_count || 0} 页`].filter(Boolean).join(' · ');
    }

    function renderNavItem(item, index) {
      const id = itemDomId(item);
      const readMark = isRead(item) ? '<em class="read-mini">已读</em>' : '';
      return `<button class="nav-link ${String(item.id) === String(state.selectedId) ? 'active' : ''}" type="button" data-id="${esc(item.id)}">
        <span class="nav-index">${String(index + 1).padStart(2, '0')}</span>
        <span class="nav-copy"><span class="nav-title-line"><b>${highlight(itemTitle(item))}</b>${readMark}</span><small>${highlight(itemSubTitle(item))}</small><small class="nav-date">${highlight(compactDateText(item))}</small></span>
      </button>`;
    }

    function readToggleHtml(item) {
      const active = isRead(item);
      return `<button class="read-toggle ${active ? 'active' : ''}" type="button" data-read-toggle="${esc(item.id)}" aria-pressed="${String(active)}" title="${active ? '取消已读' : '标记为已读'}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
        <span>${active ? '已读' : '标记已读'}</span>
      </button>`;
    }

    function articleActionFor(item) {
      const text = [item.category, ...(item.tags || [])].join(' ');
      if (/爬虫|robots|抓取|访问控制|AI爬虫/.test(text)) {
        return '落地时先拆清训练爬虫、搜索爬虫和用户触发访问，分别检查 robots.txt、页面状态码、日志命中和是否允许进入搜索/回答链路。';
      }
      if (/结构化|Schema|实体|Organization|Article|Product|Q&A/.test(text)) {
        return '落地时把品牌、产品、作者、发布日期、问答、价格、证据来源等实体关系显式标注，并确认结构化数据与页面可见内容一致。';
      }
      if (/RAG|召回|重排|向量|检索|分块|rerank|Embedding/.test(text)) {
        return '落地时把文章拆成可独立召回的信息块，同时覆盖关键词、语义问题、实体别名和证据句，便于粗召回和重排同时命中。';
      }
      if (/监测|评估|可见度|行业数据|生态/.test(text)) {
        return '落地时把问题集、AI答案、引用来源、品牌提及、描述准确性和流量/抓取数据放在同一张监测表里，避免只看单一排名。';
      }
      if (/LLM可读|llms|入口/.test(text)) {
        return '落地时为模型准备短摘要、关键页面索引、权威说明和可直接引用的事实块，降低模型从长页面中定位信息的成本。';
      }
      if (/实施框架|实践|GEO|AI搜索|官方规则|搜索基础/.test(text)) {
        return '落地时把这条资料转成文章生产和验收清单：可抓取、可理解、可验证、可引用、可监测，每一项都要有对应检查证据。';
      }
      return `落地时围绕“${(item.tags || []).join(' / ') || item.category}”建立检查项，把内容结构、证据、实体和监测口径同步纳入文章生产流程。`;
    }

    function articleInsights(item) {
      return [
        {
          title: '这篇文章说明了什么',
          body: item.key_description,
          meta: `${compactDateText(item)} · ${item.source_type || '资料'} · ${item.region || '未标注地区'} · ${item.category || '未分类'}`
        },
        {
          title: '可沉淀的 GEO 规则',
          body: item.geo_value,
          meta: `核心标签：${(item.tags || []).join('、') || '未标注'}`
        },
        {
          title: '转成执行动作',
          body: articleActionFor(item),
          meta: `适用环节：${item.category || 'GEO链路'}`
        },
        {
          title: '验证和复核依据',
          body: `可用“${item.search_query || item.category}”这类检索问题复查这条资料是否覆盖抓取、索引、召回、引用、实体和监测中的关键环节；必要时打开统一中英对照阅读页或原文链接回看上下文。`,
          meta: `深度评分 ${item.depth_score || '-'} · 原始来源：${item.title}`
        }
      ];
    }

    function renderArticle(item) {
      const cnTitle = articleTitleCn(item);
      const originalLine = hasTranslatedArticleTitle(item) ? item.title : (item.search_query || '');
      const insightRows = articleInsights(item).map(insight => `<li>
        <b>${highlight(insight.title)}</b>
        <span>${highlight(insight.body)}</span>
        <small>${highlight(insight.meta)}</small>
      </li>`).join('');
      return `<article class="insight-card" id="article-${esc(item.id)}">
        <div class="card-top">
          <span class="id-badge">ART-${esc(item.id)}</span>
          <div class="source-line">
            <span class="region">${highlight(item.region)}</span>
            <span>${highlight(item.source_type)}</span>
            <span class="score">深度 ${esc(item.depth_score)}</span>
            ${dateBadgeHtml(item)}
          </div>
          <span>${highlight(item.category)}</span>
          ${readToggleHtml(item)}
        </div>
        <div class="card-main">
          <h2><a href="${esc(item.url)}">${highlight(cnTitle)}</a></h2>
          <p class="origin">${highlight(originalLine)}</p>
          <div class="summary-grid">
            <section class="note-block">
              <span class="label">摘要重点</span>
              <p>${highlight(item.key_description)}</p>
            </section>
            <section class="note-block rule">
              <span class="label">GEO 相关观点 / 规则</span>
              <p>${highlight(item.geo_value)}</p>
            </section>
          </div>
          <section class="insight-list">
            <h3>摘要中的可执行观点</h3>
            <ol>${insightRows}</ol>
          </section>
          <footer class="card-footer">
            <div class="tags">${(item.tags || []).map(tag => `<span class="tag">${highlight(tag)}</span>`).join('')}</div>
            <div class="actions">${articleLocalLinks(item)}</div>
          </footer>
        </div>
      </article>`;
    }

    function renderPaper(item) {
      const insightRows = (item.insights || []).map(insight => `<li>
        <b>${highlight(insight.title)}</b>
        <span>${highlight(insight.geo_principle || insight.geo_value || insight.point)}</span>
        <small>页码 ${(insight.pages || []).join(', ')} · ${highlight(insight.evidence || '')}</small>
      </li>`).join('');
      return `<article class="insight-card" id="paper-${esc(item.id)}">
        <div class="card-top">
          <span class="id-badge">PAPER-${esc(item.id)}</span>
          <div class="source-line">
            <span>${highlight(item.category)}</span>
            <span>${esc(item.page_count)} 页</span>
            ${dateBadgeHtml(item)}
          </div>
          <span>${highlight(item.topic)}</span>
          ${readToggleHtml(item)}
        </div>
        <div class="card-main">
          <h2><a href="${esc(item.url)}">${highlight(item.title_cn)}</a></h2>
          <p class="origin">${highlight(item.title)}</p>
          <div class="summary-grid">
            <section class="note-block">
              <span class="label">摘要重点</span>
              <p>${highlight(item.summary)}</p>
            </section>
            <section class="note-block rule">
              <span class="label">GEO 相关观点 / 规则</span>
              <p>${highlight(item.geo_principle)}</p>
            </section>
          </div>
          <section class="insight-list">
            <h3>摘要中的可执行观点</h3>
            <ol>${insightRows}</ol>
          </section>
          <footer class="card-footer">
            <div class="tags">${(item.tags || []).map(tag => `<span class="tag">${highlight(tag)}</span>`).join('')}</div>
            <div class="actions">
              ${item.bilingual_file ? `<a class="text-link" href="${esc(bilingualReaderHref(item))}" title="打开统一阅读页，按 MD 文件加载中英对照内容">中英对照阅读</a>` : ''}
              <a class="text-link" href="${esc(item.url)}">原文链接</a>
            </div>
          </footer>
        </div>
      </article>`;
    }

    function render() {
      renderCategoryOptions();
      const items = sortByNewest(activeItems().filter(matches));
      if (!items.some(item => String(item.id) === String(state.selectedId))) {
        state.selectedId = items[0] ? String(items[0].id) : null;
      }
      const selected = items.find(item => String(item.id) === String(state.selectedId));
      navEl.innerHTML = items.map(renderNavItem).join('');
      listEl.innerHTML = selected ? (state.tab === 'articles' ? renderArticle(selected) : renderPaper(selected)) : '';
      empty.classList.toggle('show', items.length === 0);
    }

    function setCategoryMenu(open) {
      categoryFilter.classList.toggle('open', open);
      categoryMenu.hidden = !open;
      categoryTrigger.setAttribute('aria-expanded', String(open));
    }

    categoryTrigger.addEventListener('click', () => {
      setCategoryMenu(categoryMenu.hidden);
    });

    categoryOptions.addEventListener('click', event => {
      const button = event.target.closest('.category-option');
      if (!button) return;
      const name = button.dataset.category;
      if (name === '全部') {
        state.categories.clear();
      } else if (state.categories.has(name)) {
        state.categories.delete(name);
      } else {
        state.categories.add(name);
      }
      state.selectedId = null;
      render();
    });

    document.addEventListener('click', event => {
      if (!categoryFilter.contains(event.target)) setCategoryMenu(false);
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') setCategoryMenu(false);
    });

    navEl.addEventListener('click', event => {
      const button = event.target.closest('.nav-link');
      if (!button) return;
      state.selectedId = button.dataset.id;
      render();
    });

    listEl.addEventListener('click', event => {
      const button = event.target.closest('[data-read-toggle]');
      if (!button) return;
      const selected = activeItems().find(item => String(item.id) === String(button.dataset.readToggle));
      if (!selected) return;
      toggleRead(selected);
      render();
    });

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(item => item.classList.remove('active'));
        tab.classList.add('active');
        state.tab = tab.dataset.tab;
        state.categories.clear();
        state.readFilter = 'all';
        state.selectedId = null;
        q.value = '';
        state.query = '';
        readFilter.value = state.readFilter;
        render();
      });
    });

    q.addEventListener('input', () => {
      state.query = q.value;
      state.selectedId = null;
      render();
    });
    readFilter.addEventListener('change', () => {
      state.readFilter = readFilter.value;
      state.selectedId = null;
      render();
    });
    document.querySelector('#reset').addEventListener('click', () => {
      state.query = '';
      state.categories.clear();
      state.readFilter = 'all';
      state.selectedId = null;
      q.value = '';
      readFilter.value = state.readFilter;
      setCategoryMenu(false);
      render();
    });
    document.querySelector('#backTop').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    themeButtons.forEach(button => {
      button.addEventListener('click', () => setTheme(button.dataset.themeOption));
    });

    render();
  </script>
</body>
</html>
