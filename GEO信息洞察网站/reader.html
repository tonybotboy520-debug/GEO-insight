  <style>

    body[data-theme="light"] {
      --bg: #f5f7f4;
      --surface: #ffffff;
      --surface-2: #fbfcfb;
      --surface-3: #fcfdfc;
      --ink: #14211d;
      --muted: #6c7772;
      --soft: #eef2ee;
      --line: #dde5df;
      --line-strong: #bdcbc4;
      --accent: #13766c;
      --blue: #365f84;
      --cyan: #c68419;
      --shadow: 0 18px 42px rgba(22, 37, 32, .08);
      --page-bg:
        linear-gradient(180deg, rgba(255,255,255,.82), rgba(245,247,244,.9) 260px),
        radial-gradient(circle at 0 0, rgba(19,118,108,.08), transparent 330px),
        var(--bg);
      --lede: #53605a;
      --glass: rgba(255,255,255,.86);
      --panel-bg: rgba(255,255,255,.88);
      --field-bg: #fbfcfb;
      --plain-text: #2a3732;
      --chip-text: #43514b;
      --badge-bg: #172a24;
      --badge-ink: #ffffff;
      --accent-wash: rgba(19, 118, 108, .08);
      --blue-wash: rgba(54, 95, 132, .1);
      --cyan-wash: rgba(198,132,25,.12);
      --mark-bg: rgba(198, 132, 25, .24);
      --theme-active-bg: #172a24;
      --theme-active-ink: #ffffff;
      --focus-ring: rgba(19, 118, 108, .35);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      position: relative;
      margin: 0;
      color: var(--ink);
      background: var(--page-bg);
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
      line-height: 1.68;
      letter-spacing: 0;
      color-scheme: dark;
    }

    body[data-theme="light"] { color-scheme: light; }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.026) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.8), transparent 70%);
      opacity: .35;
    }
    body[data-theme="light"]::before { display: none; }

    a { color: inherit; }
    button, input { font: inherit; letter-spacing: 0; }
    button, a, input { transition: background-color .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease; }
    button:focus-visible, a:focus-visible, input:focus-visible {
      outline: 2px solid var(--focus-ring);
      outline-offset: 3px;
    }
    ::placeholder { color: var(--muted); opacity: .78; }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 28px 44px;
    }

    .topbar {
      position: sticky;
      top: 14px;
      z-index: 9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      min-height: 42px;
      margin-bottom: 14px;
      pointer-events: none;
    }

    .back-link,
    .theme-switch {
      pointer-events: auto;
      border: 1px solid var(--line);
      background: var(--glass);
      box-shadow: 0 12px 32px rgba(0, 0, 0, .12);
      backdrop-filter: blur(16px);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      color: var(--chip-text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 750;
    }

    .back-link:hover { border-color: var(--accent); color: var(--accent); }
    .back-link svg { width: 16px; height: 16px; }

    .theme-switch {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(74px, 1fr));
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
    }

    .theme-option {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 0 12px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 750;
      white-space: nowrap;
    }

    .theme-option svg { width: 15px; height: 15px; }
    .theme-option.active {
      background: var(--theme-active-bg);
      color: var(--theme-active-ink);
      box-shadow: 0 6px 18px rgba(0, 0, 0, .16);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 430px);
      gap: 34px;
      align-items: end;
      padding: 12px 0 28px;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 940px;
      font-family: "Songti SC", "STSong", "Noto Serif CJK SC", "Source Han Serif SC", serif;
      font-size: clamp(32px, 4.2vw, 54px);
      line-height: 1.12;
      font-weight: 650;
      overflow-wrap: anywhere;
    }

    body[data-theme="dark"] h1 {
      color: #fffaf1;
      text-shadow: 0 16px 42px rgba(215, 182, 110, .12);
    }

    .lede {
      max-width: 940px;
      margin: 14px 0 0;
      color: var(--lede);
      font-size: 16px;
      line-height: 1.8;
    }

    .meta-panel {
      display: grid;
      gap: 10px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--surface-2), var(--panel-bg));
      box-shadow: var(--shadow);
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.42;
    }

    .meta-row b {
      color: var(--ink);
      font-weight: 750;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .reader-shell {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-bg);
      box-shadow: var(--shadow);
    }

    .toolbar {
      position: sticky;
      top: 68px;
      z-index: 5;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 12, 15, .92);
      backdrop-filter: blur(14px);
    }

    body[data-theme="light"] .toolbar { background: rgba(255,255,255,.94); }

    .searchbox {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 0 13px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--field-bg);
    }

    .searchbox:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-wash);
    }

    .searchbox svg { width: 18px; height: 18px; color: var(--accent); flex: 0 0 auto; }
    input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font-size: 15px;
    }

    .segmented,
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .mode-btn,
    .text-link,
    .icon-btn {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: var(--chip-text);
      cursor: pointer;
      text-decoration: none;
      font-size: 13px;
      font-weight: 750;
    }

    .mode-btn {
      min-height: 38px;
      padding: 7px 10px;
    }

    .mode-btn.active {
      border-color: var(--accent);
      background: var(--accent-wash);
      color: var(--accent);
    }

    .text-link {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 7px 10px;
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      width: 40px;
      height: 40px;
    }

    .text-link:hover,
    .icon-btn:hover,
    .mode-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .icon-btn svg { width: 17px; height: 17px; }

    .reader-grid {
      display: grid;
      grid-template-columns: 286px minmax(0, 1fr);
      background: var(--surface-3);
    }

    .side {
      border-right: 1px solid var(--line);
      background: var(--surface-3);
    }

    .side-inner {
      position: sticky;
      top: 140px;
      max-height: calc(100vh - 160px);
      overflow: auto;
      padding: 16px 12px 16px 16px;
    }

    .side-title {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .nav-list {
      display: grid;
      gap: 6px;
    }

    .nav-item {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      width: 100%;
      padding: 9px 10px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--chip-text);
      text-align: left;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }

    .nav-item:hover,
    .nav-item.active {
      border-color: var(--line);
      background: var(--surface);
      color: var(--ink);
    }

    .nav-index {
      display: grid;
      place-items: center;
      min-width: 28px;
      height: 24px;
      border-radius: 6px;
      background: var(--soft);
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
    }

    .nav-item.active .nav-index {
      background: var(--accent);
      color: var(--badge-ink);
    }

    .nav-copy {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .content {
      min-width: 0;
      padding: 16px;
      background: #080a0d;
    }

    body[data-theme="light"] .content { background: #f8faf8; }

    .notice,
    .loading {
      margin: 0;
      padding: 30px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      color: var(--muted);
      background: var(--surface);
      text-align: center;
    }

    .pair-list {
      display: grid;
      gap: 14px;
    }

    .pair-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.035);
      scroll-margin-top: 150px;
    }

    .pair-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .pair-head b {
      color: var(--accent);
      font-weight: 800;
    }

    .pair-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 0;
    }

    .lang-panel {
      min-width: 0;
      padding: 16px 18px 18px;
    }

    .lang-panel + .lang-panel {
      border-left: 1px solid var(--line);
    }

    .lang-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .lang-label::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    .lang-panel.en .lang-label::before { background: var(--blue); }
    .lang-text {
      margin: 0;
      color: var(--plain-text);
      font-size: 16px;
      line-height: 1.86;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .lang-panel.en .lang-text {
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
      color: color-mix(in srgb, var(--plain-text) 88%, var(--blue));
    }

    body[data-view="zh"] .lang-panel.en,
    body[data-view="en"] .lang-panel.zh { display: none; }
    body[data-view="zh"] .pair-grid,
    body[data-view="en"] .pair-grid { grid-template-columns: minmax(0, 1fr); }
    body[data-view="zh"] .lang-panel + .lang-panel,
    body[data-view="en"] .lang-panel + .lang-panel { border-left: 0; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }

    .chip {
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--chip-text);
      background: var(--field-bg);
      font-size: 12px;
      font-weight: 750;
      line-height: 1.2;
    }

    .chip.accent {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-wash);
    }

    mark {
      padding: 0 2px;
      border-radius: 3px;
      background: var(--mark-bg);
      color: inherit;
    }

    [hidden] { display: none !important; }

    @supports not (color: color-mix(in srgb, white, black)) {
      .lang-panel.en .lang-text { color: var(--plain-text); }
    }

    @media (max-width: 1020px) {
      .hero { grid-template-columns: 1fr; gap: 22px; }
      .toolbar { grid-template-columns: 1fr; }
      .reader-grid { grid-template-columns: 236px minmax(0, 1fr); }
      .side-inner { padding: 14px 10px; }
    }

    @media (max-width: 760px) {
      .shell { padding: 18px 14px 30px; }
      .topbar { position: static; align-items: flex-start; flex-direction: column; }
      .theme-switch { width: 100%; }
      .hero { padding-top: 6px; }
      .reader-grid { grid-template-columns: 1fr; }
      .side { border-right: 0; border-bottom: 1px solid var(--line); }
      .side-inner { position: static; max-height: 220px; padding: 12px; }
      .content { padding: 10px; }
      .pair-grid { grid-template-columns: 1fr; }
      .lang-panel + .lang-panel { border-left: 0; border-top: 1px solid var(--line); }
      .meta-panel { padding: 14px; }
      .meta-row { align-items: flex-start; flex-direction: column; gap: 4px; }
      .meta-row b { text-align: left; }
    }

    function isMostlyChinese(value) {
      const raw = String(value || '');
      const zh = (raw.match(/[\u4e00-\u9fff]/g) || []).length;
      const latin = (raw.match(/[A-Za-z]/g) || []).length;
      return zh > 0 && zh >= latin * 0.3;
    }

    function sourceHost(value) {
      try {
        return new URL(value).hostname.replace(/^www\./, '');
      } catch (_) {
        return value || '-';
      }
    }

    function formatDate(value) {
      const text = String(value || '').trim();
      if (!text) return '';
      const match = text.match(/^(\d{4})(?:-(\d{2}))?(?:-(\d{2}))?/);
      if (!match) return text;
      return [match[1], match[2], match[3]].filter(Boolean).join('.');
    }

    function primaryDateInfo(record) {
      if (record.published_at) {
        return { label: '发布时间', compactLabel: '发布', text: formatDate(record.published_at), missing: false };
      }
      if (record.updated_at) {
        return { label: '更新时间', compactLabel: '更新', text: formatDate(record.updated_at), missing: false };
      }
      return { label: '时间', compactLabel: '时间', text: '未公开', missing: true };
    }

    function fullDateText(record) {
      const info = primaryDateInfo(record);
      const parts = [`${info.label} ${info.text}`];
      if (record.published_at && record.updated_at && record.published_at !== record.updated_at) {
        parts.push(`更新时间 ${formatDate(record.updated_at)}`);
      }
      return parts.join(' · ');
    }

    function compactDateText(record) {
      const info = primaryDateInfo(record);
      return info.missing ? '时间未公开' : `${info.compactLabel} ${info.text}`;
    }

    function resolveTitles(parsed, record) {
      const original = (parsed.title || '').trim();
      const recordTitle = (record.title || '').trim();
      const mappedCn = ARTICLE_TITLE_CN[record.id] || '';
      const translated = mappedCn || (recordTitle && recordTitle !== original ? recordTitle : '');
      if (translated && !isMostlyChinese(original)) {
        return { primary: translated, secondary: original };
      }
      if (original && recordTitle && original !== recordTitle && isMostlyChinese(original)) {
        return { primary: original, secondary: recordTitle };
      }
      return { primary: translated || original || recordTitle || '中英文对照阅读', secondary: translated && translated !== original ? original : '' };
    }

    function highlight(value) {
      const raw = String(value || '');
      const term = state.query.trim();
      if (!term) return esc(raw);
      const safe = esc(raw);
      const parts = term.split(/\s+/).filter(Boolean).map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
      if (!parts.length) return safe;
      return safe.replace(new RegExp('(' + parts.join('|') + ')', 'gi'), '<mark>$1</mark>');
    }

    function setTheme(theme) {
      const nextTheme = theme === 'light' ? 'light' : 'dark';
      document.body.dataset.theme = nextTheme;
      el.themeButtons.forEach(button => {
        const active = button.dataset.themeOption === nextTheme;
        button.classList.toggle('active', active);
        button.setAttribute('aria-pressed', String(active));
      });
      localStorage.setItem('geoInsightTheme', nextTheme);
    }

    function findRecord() {
      const id = params.get('id');
      const file = normPath(params.get('file'));
      return DATA.index.find(item => String(item.id) === String(id))
        || DATA.index.find(item => normPath(item.bilingual_file) === file)
        || null;
    }

    async function loadMarkdown(path) {
      if (location.protocol !== 'file:') {
        try {
          const response = await fetch(path);
          if (response.ok) return await response.text();
        } catch (_) {}
      }
      return DATA.markdownByPath[path] || '';
    }

    function parseMarkdown(markdown, record) {
      const text = String(markdown || '').replace(/\r\n/g, '\n');
      const title = (text.match(/^#\s+(.+)$/m) || [null, record && record.title || '中英文对照阅读'])[1];
      const meta = {};
      const metaEnd = text.indexOf('## 段落对照');
      text.slice(0, metaEnd > -1 ? metaEnd : 1200).split('\n').forEach(line => {
        const match = line.match(/^-\s*([^:：]+)[:：]\s*(.*)$/);
        if (match) meta[match[1].trim()] = match[2].trim();
      });
      const paragraphs = [];
      const re = /###\s+段落\s+(\d+)(?:\s+·\s+([^\n]+))?\n+\*\*EN\*\*\n+([\s\S]*?)\n+\*\*中文\*\*\n+([\s\S]*?)(?=\n+###\s+(?:段落\s+\d+|Page\s+\d+)|\s*$)/g;
      let match;
      while ((match = re.exec(text))) {
        paragraphs.push({
          number: Number(match[1]),
          page: (match[2] || '').trim(),
          en: match[3].trim(),
          zh: match[4].trim()
        });
      }
      return { title, meta, paragraphs };
    }

    function makeNav(paragraphs) {
      const pageMap = new Map();
      paragraphs.forEach(p => {
        const label = p.page || `段落 ${p.number}`;
        if (!pageMap.has(label)) pageMap.set(label, p);
      });
      if (pageMap.size > 1 && paragraphs.some(p => p.page)) {
        if (el.navTitle) el.navTitle.textContent = '页面导航';
        return [...pageMap.entries()].map(([label, p], index) => ({ label, number: index + 1, target: p.number }));
      }
      if (el.navTitle) el.navTitle.textContent = '段落导航';
      return paragraphs.slice(0, 120).map(p => ({ label: `段落 ${p.number}`, number: p.number, target: p.number }));
    }

    function paragraphMatches(p) {
      const terms = state.query.toLowerCase().split(/\s+/).filter(Boolean);
      if (!terms.length) return true;
      const haystack = [p.number, p.page, p.en, p.zh].join(' ').toLowerCase();
      return terms.every(term => haystack.includes(term));
    }

    function renderNav() {
      if (!el.navList) return;
      const visibleNumbers = new Set(state.paragraphs.filter(paragraphMatches).map(p => p.number));
      const items = state.navItems.filter(item => visibleNumbers.has(item.target) || !state.query);
      el.navList.innerHTML = items.map(item => `
        <a class="nav-item" href="#p-${item.target}">
          <span class="nav-index">${esc(item.number)}</span>
          <span class="nav-copy">${highlight(item.label)}</span>
        </a>`).join('');
    }

    function renderParagraphs() {
      const filtered = state.paragraphs.filter(paragraphMatches);
      el.pairList.innerHTML = filtered.map(p => `
        <article class="pair-card" id="p-${p.number}">
          <div class="pair-head">
            <span><b>段落 ${esc(p.number)}</b>${p.page ? ` · ${highlight(p.page)}` : ''}</span>
            <span>${state.record ? esc(state.record.kind === 'pdf' ? '论文' : '文章') : '资料'}</span>
          </div>
          <div class="pair-grid">
            <section class="lang-panel en">
              <span class="lang-label">原文</span>
              <p class="lang-text">${highlight(p.en)}</p>
            </section>
            <section class="lang-panel zh">
              <span class="lang-label">中文译文</span>
              <p class="lang-text">${highlight(p.zh)}</p>
            </section>
          </div>
        </article>`).join('');
      el.notice.hidden = filtered.length !== 0;
      if (!filtered.length) {
        el.notice.textContent = '没有匹配段落，换一个关键词试试。';
      }
      el.countText.textContent = `${filtered.length} / ${state.paragraphs.length}`;
      renderNav();
    }

    function renderHeader(parsed) {
      const record = state.record || {};
      const kind = record.kind || parsed.meta['类型'] || '-';
      const titles = resolveTitles(parsed, record);
      el.title.textContent = titles.primary;
      el.titleTranslation.textContent = titles.secondary;
      el.titleTranslation.hidden = !titles.secondary;
      el.subtitle.textContent = parsed.meta['翻译说明'] || '按资料库中的 MD 文件动态加载内容，以“原文段落在前、中文译文在后”的方式阅读文章和论文。';
      el.kindText.textContent = kind === 'pdf' ? '论文' : (kind === 'html' ? '文章' : kind);
      el.categoryText.textContent = record.category || parsed.meta['主题'] || '-';
      el.sourceHostText.textContent = sourceHost(record.url || parsed.meta['原文链接']);
      el.dateText.textContent = fullDateText(record);
      el.pathText.textContent = state.path || '-';
      el.mdLink.href = state.path;
      el.sourceLink.href = record.url || parsed.meta['原文链接'] || '#';
      el.sourceLink.toggleAttribute('hidden', !(record.url || parsed.meta['原文链接']));
      el.chips.innerHTML = [
        record.id ? `ID ${record.id}` : '',
        record.category || parsed.meta['主题'] || '',
        record.paragraphs ? `${record.paragraphs} 段` : '',
        compactDateText(record)
      ].filter(Boolean).map((item, index) => `<span class="chip ${index === 0 ? 'accent' : ''}">${esc(item)}</span>`).join('');
    }

    async function init() {
      setTheme(localStorage.getItem('geoInsightTheme') || 'dark');
      state.record = findRecord();
      const fileParam = normPath(params.get('file'));
      state.path = normPath((state.record && state.record.bilingual_file) || fileParam);
      if (!state.path) {
        el.loading.hidden = true;
        el.notice.hidden = false;
        el.notice.textContent = '缺少 MD 文件参数，请从资料库里的“中英对照阅读”按钮进入。';
        return;
      }
      const markdown = await loadMarkdown(state.path);
      if (!markdown) {
        el.loading.hidden = true;
        el.notice.hidden = false;
        el.notice.textContent = '没有加载到对应 MD。直接 file:// 打开时需要依赖本页的数据包，或者通过本地服务打开资料库。';
        return;
      }
      const parsed = parseMarkdown(markdown, state.record);
      state.paragraphs = parsed.paragraphs;
      state.navItems = makeNav(parsed.paragraphs);
      renderHeader(parsed);
      el.loading.hidden = true;
      renderParagraphs();
    }

    el.themeButtons.forEach(button => {
      button.addEventListener('click', () => setTheme(button.dataset.themeOption));
    });
    el.modeButtons.forEach(button => {
      button.addEventListener('click', () => {
        state.view = button.dataset.view;
        document.body.dataset.view = state.view;
        el.modeButtons.forEach(item => item.classList.toggle('active', item === button));
      });
    });
    el.q.addEventListener('input', () => {
      state.query = el.q.value;
      renderParagraphs();
    });
    document.querySelector('#backTop').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    document.addEventListener('click', event => {
      const nav = event.target.closest('.nav-item');
      if (!nav) return;
      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
      nav.classList.add('active');
    });

    init();
  </script>
</body>
</html>
